name: Automatic Repository Sync

# Trigger conditions: run on push to main branch, or manual trigger
on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allow manual execution

# Set permissions for GITHUB_TOKEN
permissions:
  contents: write
  pull-requests: read

jobs:
  sync-repository:
    name: Sync Code to Target Repository
    runs-on: ubuntu-latest
    steps:
      # Step 1: Check out the source repository code
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for complete sync

      # Step 2: Set up Git configuration (required for commit/push)
      - name: Configure Git Identity
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          echo "Git identity configured successfully"

      # Step 3: Add target repository as a remote
      - name: Add Target Remote Repository
        env:
          TARGET_REPO_URL: ${{ secrets.TARGET_REPO_URL }} # Store in GitHub Secrets
        run: |
          git remote add target $TARGET_REPO_URL
          git remote -v # Verify remote configuration

      # Step 4: Push code to target repository (force push for full sync, adjust as needed)
      - name: Push Code to Target Repository
        run: |
          git push --force target main
          echo "Code synced to target repository successfully"

      # Step 5: Handle sync failure (optional)
      - name: Sync Failure Notification
        if: failure()
        run: |
          echo "Error: Repository sync failed! Please check the logs for details."
