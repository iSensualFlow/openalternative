name: Automatic Repository Sync

# Trigger conditions: automatic sync at midnight daily, or manual trigger anytime
on:
  schedule:
    - cron: '0 0 * * *' # UTC 00:00 (Beijing time 08:00) runs automatically
  workflow_dispatch: # Allows you to manually click "Run workflow" on GitHub page

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true" # Force Node.js 24 to eliminate deprecation warning

# Critical: Grant local GITHUB_TOKEN write permission to your current repository
permissions:
  contents: write

jobs:
  sync-upstream:
    name: Sync from Original Repository
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout your own repository code
      - name: Checkout Your Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch full history to prevent merge conflicts

      # Step 2: Configure Git identity
      - name: Configure Git Identity
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      # Step 3: Add upstream repository, fetch and merge, then push to your own repository
      - name: Fetch and Sync from Upstream
        run: |
          # 1. Add the upstream repository
          git remote add upstream https://github.com/piotrkulpinski/openalternative.git
          
          # 2. Fetch all branches and updates from upstream
          git fetch upstream main
          
          # 3. Switch to your own main branch (just in case)
          git checkout main
          
          # 4. Merge upstream main branch into your local main branch
          # Note: Using merge to preserve commit history. For force sync, use git reset --hard upstream/main
          git merge upstream/main --allow-unrelated-histories -m "chore: sync with upstream original repository"
          
          # 5. Push back to your remote repository
          git push origin main
          echo "Successfully synced with piotrkulpinski/openalternative"

      # Step 4: Setup GitHub Pages environment and ensure README.md accessibility
      - name: Setup GitHub Pages Environment
        run: |
          echo "Setting up GitHub Pages environment..."
          
          # Create docs directory if it doesn't exist
          mkdir -p docs
          
          # Create symbolic link to README.md in docs directory
          # This allows the HTML page to access README.md from the same directory level
          if [ ! -f "docs/README.md" ]; then
            ln -sf ../README.md docs/README.md
            echo "Created symbolic link: docs/README.md -> ../README.md"
          fi
          
          # Create .nojekyll file to disable Jekyll processing
          # This ensures GitHub Pages serves files as-is without Jekyll transformation
          touch docs/.nojekyll
          echo "Created docs/.nojekyll file"
          
          # Create _config.yml for GitHub Pages if it doesn't exist
          if [ ! -f "_config.yml" ]; then
            cat > _config.yml << 'EOF'
# GitHub Pages configuration
title: Awesome Open Source Alternatives
description: Curated list of open source alternatives to proprietary software

# Include README.md for access by HTML pages
include:
  - README.md

# Exclude unnecessary files
exclude:
  - .github/
  - node_modules/

# Custom 404 page
permalink: pretty
EOF
            echo "Created _config.yml file"
          fi
          
          echo "GitHub Pages environment setup complete"

      # Step 5: Check if HTML file exists and create if missing
      - name: Ensure HTML File Exists
        run: |
          if [ ! -f "docs/index.html" ]; then
            echo "Warning: docs/index.html not found. Please create it for GitHub Pages."
            echo "You can create a basic index.html or use the dark theme template."
          else
            echo "docs/index.html found"
          fi

      # Step 6: Commit and push GitHub Pages configuration changes
      - name: Commit and Push Pages Configuration
        run: |
          # Check for any changes and commit them
          git add docs/README.md docs/.nojekyll _config.yml docs/index.html 2>/dev/null || true
          
          # Commit if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "chore: update GitHub Pages configuration and symlinks"
            git push origin main
            echo "Successfully committed and pushed Pages configuration"
          else
            echo "No changes to commit for Pages configuration"
          fi

      # Step 7: Notification on failure
      - name: Sync Failure Notification
        if: failure()
        run: |
          echo "Error: Repository sync failed! There might be merge conflicts or permission issues."
          echo "Please check the workflow logs for more details."
