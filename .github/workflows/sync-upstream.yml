name: Automatic Repository Sync

# Trigger conditions: run on push to main branch, or manual trigger
on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allow manual execution

# Set permissions for GITHUB_TOKEN (Only affects current source repo)
permissions:
  contents: write
  pull-requests: read

jobs:
  sync-repository:
    name: Sync Code to Target Repository
    runs-on: ubuntu-latest
    steps:
      # Step 1: Check out the source repository code
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for complete sync
          persist-credentials: false # 【重要】防止源仓库的凭证干扰目标仓库的推送

      # Step 2: Set up Git configuration
      - name: Configure Git Identity
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      # Step 3 & 4 合并：动态带上 Token 认证并推送到目标仓库
      - name: Push Code to Target Repository
        env:
          TARGET_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
          TARGET_URL: ${{ secrets.TARGET_REPO_URL }} # 格式如: github.com/user/target-repo.git
        run: |
          # 将 Token 嵌入 HTTPS 链接中实现免密鉴权
          git push --force "https://${TARGET_TOKEN}@${TARGET_URL}" main
          echo "Code synced to target repository successfully"

      # Step 5: Handle sync failure
      - name: Sync Failure Notification
        if: failure()
        run: |
          echo "Error: Repository sync failed! Please check the logs for details."
