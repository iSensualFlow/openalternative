
name: Automatic Repository Sync

# Trigger conditions: automatic sync at midnight daily, or manual trigger anytime
on:
  schedule:
    - cron: '0 0 * * *' # UTC 00:00 (Beijing time 08:00) runs automatically
  workflow_dispatch: # Allows you to manually click "Run workflow" on GitHub page

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true" # Force Node.js 24 to eliminate deprecation warning

# Critical: Grant local GITHUB_TOKEN write permission to your current repository
permissions:
  contents: write

jobs:
  sync-upstream:
    name: Sync from Original Repository
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout your own repository code
      - name: Checkout Your Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch full history to prevent merge conflicts

      # Step 2: Configure Git identity
      - name: Configure Git Identity
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      # Step 3: Add upstream repository, fetch and merge, then push to your own repository
      - name: Fetch and Sync from Upstream
        run: |
          # 1. Add the upstream repository
          git remote add upstream https://github.com/piotrkulpinski/openalternative.git
          
          # 2. Fetch all branches and updates from upstream
          git fetch upstream main
          
          # 3. Switch to your own main branch (just in case)
          git checkout main
          
          # 4. Merge upstream main branch into your local main branch
          # Note: Using merge to preserve commit history. For force sync, use git reset --hard upstream/main
          git merge upstream/main --allow-unrelated-histories -m "chore: sync with upstream original repository"
          
          # 5. Push back to your remote repository
          git push origin main
          echo "Successfully synced with piotrkulpinski/openalternative"

      # Step 4: Notification on failure
      - name: Sync Failure Notification
        if: failure()
        run: |
          echo "Error: Repository sync failed! There might be merge conflicts or permission issues."
