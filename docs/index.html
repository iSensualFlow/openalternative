<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awesome Open Source Alternatives</title>
    <meta name="description" content="Curated list of open source alternatives to proprietary software">
    
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --border: #30363d;
            --accent: #58a6ff;
            --accent-glow: #1f6feb;
            --success: #3fb950;
            --warning: #d29922;
            --danger: #f85149;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Loading Animation */
        .loading {
            text-align: center;
            padding: 50px;
        }

        .loader {
            border: 3px solid var(--bg-tertiary);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 80px 20px;
            background: linear-gradient(135deg, #1a0b2e 0%, #0d1117 100%);
            border-radius: 24px;
            margin-bottom: 40px;
            border: 1px solid var(--border);
        }

        .hero h1 {
            font-size: 3.5rem;
            background: linear-gradient(135deg, #58a6ff, #da6dff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
        }

        .hero-subtitle {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 30px;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }

        .stat-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            transition: transform 0.2s, border-color 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent);
            display: block;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 8px;
        }

        /* Note Banner */
        .note-banner {
            background: rgba(210, 153, 34, 0.1);
            border-left: 4px solid var(--warning);
            padding: 16px 24px;
            border-radius: 8px;
            margin: 24px 0;
        }

        /* Sponsors */
        .sponsors {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            margin: 40px 0;
            text-align: center;
        }

        .sponsors-grid {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin: 30px 0;
        }

        .sponsor-item img {
            height: 48px;
            object-fit: contain;
            filter: brightness(0.9);
            transition: filter 0.2s;
        }

        .sponsor-item img:hover {
            filter: brightness(1);
        }

        /* Navigation */
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin: 40px 0;
        }

        .nav-item {
            padding: 8px 12px;
            color: var(--text-primary);
            text-decoration: none;
            border-radius: 8px;
            transition: background 0.2s;
            cursor: pointer;
        }

        .nav-item:hover {
            background: var(--bg-tertiary);
            color: var(--accent);
        }

        /* Categories */
        .category {
            margin: 50px 0;
        }

        .category-header {
            font-size: 2rem;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .subcategory {
            margin: 30px 0;
        }

        .subcategory-header {
            font-size: 1.5rem;
            margin: 20px 0 16px;
            padding-left: 16px;
            border-left: 4px solid var(--accent);
            color: var(--text-primary);
        }

        /* Cards Grid */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
        }

        .project-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.2s;
        }

        .project-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .project-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .project-title a {
            color: var(--accent);
            text-decoration: none;
        }

        .project-title a:hover {
            text-decoration: underline;
        }

        .project-description {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin: 12px 0;
            line-height: 1.5;
        }

        .project-meta {
            display: flex;
            gap: 12px;
            margin-top: 12px;
            font-size: 0.8rem;
        }

        .license-badge {
            background: var(--bg-tertiary);
            padding: 4px 8px;
            border-radius: 6px;
            font-family: monospace;
        }

        .stars-badge {
            color: var(--warning);
        }

        /* Search Box */
        .search-box {
            margin: 20px 0;
        }

        .search-input {
            width: 100%;
            padding: 12px 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* Button */
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            text-decoration: none;
            border-radius: 8px;
            border: 1px solid var(--border);
            transition: all 0.2s;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--accent-glow);
            border-color: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent);
            transform: translateY(-1px);
        }

        .btn:hover {
            background: var(--accent-glow);
            border-color: var(--accent);
            color: white;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 40px;
            margin-top: 60px;
            border-top: 1px solid var(--border);
            color: var(--text-secondary);
        }

        .footer a {
            color: var(--accent);
            text-decoration: none;
        }

        /* Scroll to top */
        .scroll-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
        }

        .scroll-top.visible {
            opacity: 1;
        }

        .scroll-top:hover {
            background: var(--accent-glow);
            border-color: var(--accent);
        }

        @media (max-width: 768px) {
            .hero h1 { font-size: 2rem; }
            .projects-grid { grid-template-columns: 1fr; }
            .container { padding: 12px; }
            .hero { padding: 40px 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="loading">
            <div class="loader"></div>
            <p>Loading content from README.md...</p>
        </div>
    </div>

    <script>
        // Parse README.md and render HTML
        async function loadAndRender() {
            try {
                // Fetch README.md from the repository
                const response = await fetch('../README.md');
                const markdown = await response.text();
                
                // Parse markdown and render
                const html = parseMarkdownToHTML(markdown);
                
                // Replace loading with content
                document.querySelector('.container').innerHTML = html;
                
                // Setup interactive features
                setupSearch();
                setupScrollTop();
                setupNavigation();
                
            } catch (error) {
                console.error('Error loading README:', error);
                document.querySelector('.container').innerHTML = `
                    <div class="hero">
                        <h1>✨ Error Loading Content</h1>
                        <p>Unable to load README.md. Please check the file exists.</p>
                    </div>
                `;
            }
        }
        
        // Parse markdown to HTML structure
        function parseMarkdownToHTML(markdown) {
            let html = '';
            
            // Extract title and description from markdown
            const lines = markdown.split('\n');
            
            // Find Hero Section (usually starts with #)
            let heroContent = '';
            let inHero = false;
            let heroLines = [];
            
            for (let i = 0; i < Math.min(50, lines.length); i++) {
                if (lines[i].startsWith('# ')) {
                    inHero = true;
                    heroLines.push(lines[i]);
                } else if (inHero && lines[i].trim() === '') {
                    break;
                } else if (inHero) {
                    heroLines.push(lines[i]);
                }
            }
            
            // Build Hero
            const titleMatch = markdown.match(/# (.*?)(?:\n|$)/);
            const title = titleMatch ? titleMatch[1] : 'Awesome Open Source Alternatives';
            const description = markdown.split('\n\n')[1] || 'Curated list of open source alternatives';
            
            html = `
                <!-- Hero Section -->
                <div class="hero">
                    <h1>✨ ${title.replace('# ', '')} ✨</h1>
                    <div class="hero-subtitle">
                        ${description.replace(/\[.*?\]\(.*?\)/g, '').substring(0, 150)}
                    </div>
                    <div>
                        <button class="btn btn-primary" onclick="window.open('https://github.com/piotrkulpinski/openalternative', '_blank')">
                            ⭐ Star on GitHub
                        </button>
                        <button class="btn" onclick="window.open('https://openalternative.co/submit', '_blank')" style="margin-left: 12px;">
                            🤝 Submit a Project
                        </button>
                    </div>
                </div>
            `;
            
            // Extract Note
            const noteMatch = markdown.match(/\*\*Note:\*\* (.*?)(?:\n\n|$)/);
            if (noteMatch) {
                html += `
                    <div class="note-banner">
                        <strong>📌 Note:</strong> ${noteMatch[1]}
                    </div>
                `;
            }
            
            // Extract Sponsors
            const sponsorMatch = markdown.match(/## Sponsors\n(.*?)(?=\n##|\n$)/s);
            if (sponsorMatch) {
                const sponsorContent = sponsorMatch[1];
                const imgMatches = [...sponsorContent.matchAll(/<img[^>]*src="([^"]*)"[^>]*>/g)];
                
                if (imgMatches.length > 0) {
                    html += `
                        <div class="sponsors">
                            <h2>💎 Sponsors</h2>
                            <div class="sponsors-grid">
                                ${imgMatches.map(img => `
                                    <div class="sponsor-item">
                                        <img src="${img[1]}" alt="Sponsor">
                                    </div>
                                `).join('')}
                            </div>
                            <p><a href="https://openalternative.co/advertise" style="color: var(--accent);">Become a sponsor →</a></p>
                        </div>
                    `;
                }
            }
            
            // Extract Stats
            const statsMatch = markdown.match(/\*\*Total Projects:\*\* (\d+).*?\*\*Categories:\*\* (\d+).*?\*\*Total Stars:\*\* ([\dM]+)/s);
            if (statsMatch) {
                html += `
                    <div class="stats-grid">
                        <div class="stat-card">
                            <span class="stat-number">${statsMatch[1]}</span>
                            <span class="stat-label">Total Projects</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-number">${statsMatch[2]}</span>
                            <span class="stat-label">Categories</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-number">${statsMatch[3]}</span>
                            <span class="stat-label">Total Stars</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-number" id="lastUpdated">--</span>
                            <span class="stat-label">Last Updated</span>
                        </div>
                    </div>
                `;
            }
            
            // Add Search Box
            html += `
                <div class="search-box">
                    <input type="text" class="search-input" id="search-input" placeholder="🔍 Search projects by name, description, or license...">
                </div>
            `;
            
            // Extract Categories and Projects
            const categories = extractCategoriesFromMarkdown(markdown);
            
            // Build Navigation
            if (categories.length > 0) {
                html += `
                    <div class="nav-grid" id="nav-grid">
                        ${categories.map(cat => `
                            <a class="nav-item" onclick="scrollToCategory('${cat.id}')">${cat.icon || '📁'} ${cat.name}</a>
                        `).join('')}
                    </div>
                `;
            }
            
            // Build Content
            html += `<div id="content">`;
            
            for (const category of categories) {
                html += `
                    <div class="category" id="category-${category.id}">
                        <div class="category-header" onclick="toggleCategory('${category.id}')">
                            <span>${category.icon || '📁'}</span>
                            <span>${category.name}</span>
                        </div>
                `;
                
                for (const subcategory of category.subcategories) {
                    html += `
                        <div class="subcategory">
                            <div class="subcategory-header">${subcategory.name}</div>
                            <div class="projects-grid" data-subcategory="${subcategory.name.replace(/[^a-zA-Z0-9]/g, '-')}">
                    `;
                    
                    for (const project of subcategory.projects) {
                        html += `
                            <div class="project-card" data-name="${project.name.toLowerCase()}" data-description="${project.description.toLowerCase()}" data-license="${project.license.toLowerCase()}">
                                <div class="project-title">
                                    <a href="${project.url}" target="_blank">${project.name}</a>
                                </div>
                                <div class="project-description">${project.description}</div>
                                <div class="project-meta">
                                    <span class="license-badge">${project.license}</span>
                                    <span class="stars-badge">${project.stars}</span>
                                </div>
                            </div>
                        `;
                    }
                    
                    html += `</div></div>`;
                }
                
                html += `</div>`;
            }
            
            html += `</div>`;
            
            // Add Contributing Section
            html += `
                <div style="background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 16px; padding: 40px; text-align: center; margin: 40px 0;">
                    <h3 style="margin-bottom: 16px;">🤝 Want to contribute?</h3>
                    <p style="color: var(--text-secondary); margin-bottom: 24px;">
                        Submit your project on OpenAlternative and it will automatically appear here once approved.
                    </p>
                    <button class="btn btn-primary" onclick="window.open('https://openalternative.co/submit', '_blank')">
                        Submit a Project →
                    </button>
                </div>
            `;
            
            // Footer
            const date = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
            html += `
                <div class="footer">
                    <p>❤️ Maintained by <a href="https://openalternative.co">OpenAlternative</a></p>
                    <p style="margin-top: 12px;">
                        <a href="https://github.com/piotrkulpinski/openalternative">GitHub</a> · 
                        <a href="https://twitter.com/openalternative">Twitter</a> · 
                        <a href="https://discord.gg/openalternative">Discord</a>
                    </p>
                    <p style="margin-top: 12px; font-size: 0.85rem;">Last updated: ${date}</p>
                </div>
            `;
            
            // Add scroll to top button
            html += `<div class="scroll-top" id="scroll-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">↑</div>`;
            
            return html;
        }
        
        // Extract categories and projects from markdown
        function extractCategoriesFromMarkdown(markdown) {
            const categories = [];
            const lines = markdown.split('\n');
            
            let currentCategory = null;
            let currentSubcategory = null;
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                
                // Match main category (## Category Name)
                if (line.startsWith('## ') && !line.startsWith('###')) {
                    if (currentCategory) {
                        categories.push(currentCategory);
                    }
                    
                    const categoryName = line.replace('## ', '');
                    // Skip non-category sections
                    if (categoryName === 'Sponsors' || categoryName === 'Contents' || categoryName === 'Contributing' || categoryName === 'Footnotes') {
                        currentCategory = null;
                        continue;
                    }
                    
                    currentCategory = {
                        name: categoryName,
                        id: categoryName.toLowerCase().replace(/[^a-z0-9]+/g, '-'),
                        icon: getCategoryIcon(categoryName),
                        subcategories: []
                    };
                }
                // Match subcategory (### Subcategory Name)
                else if (line.startsWith('### ') && currentCategory) {
                    const subcategoryName = line.replace('### ', '');
                    currentSubcategory = {
                        name: subcategoryName,
                        projects: []
                    };
                    currentCategory.subcategories.push(currentSubcategory);
                }
                // Match project lines (starting with - [ or | Project)
                else if (currentSubcategory && (line.startsWith('- [') || line.startsWith('| ['))) {
                    // Parse project from markdown
                    const projectMatch = line.match(/\[(.*?)\]\((.*?)\)\s*-\s*(.*?)(?:\s+`(.*?)`\s+⭐\s*([\d.KM]+))?/);
                    if (projectMatch) {
                        currentSubcategory.projects.push({
                            name: projectMatch[1],
                            url: projectMatch[2],
                            description: projectMatch[3].trim(),
                            license: projectMatch[4] || 'MIT',
                            stars: `⭐ ${projectMatch[5] || '0'}`
                        });
                    }
                }
            }
            
            if (currentCategory) {
                categories.push(currentCategory);
            }
            
            return categories;
        }
        
        // Get icon for category
        function getCategoryIcon(categoryName) {
            const icons = {
                'AI & Machine Learning': '🤖',
                'Business Software': '💼',
                'Community & Social': '👥',
                'Content & Publishing': '📝',
                'Data & Analytics': '📊',
                'Developer Tools': '🛠️',
                'Infrastructure & Operations': '🏗️',
                'Miscellaneous': '🎲',
                'Productivity & Utilities': '⚡',
                'Security & Privacy': '🔒'
            };
            return icons[categoryName] || '📁';
        }
        
        // Search functionality
        function setupSearch() {
            const searchInput = document.getElementById('search-input');
            if (!searchInput) return;
            
            searchInput.addEventListener('input', (e) => {
                const searchTerm = e.target.value.toLowerCase().trim();
                const projectCards = document.querySelectorAll('.project-card');
                
                projectCards.forEach(card => {
                    const name = card.getAttribute('data-name') || '';
                    const desc = card.getAttribute('data-description') || '';
                    const license = card.getAttribute('data-license') || '';
                    
                    if (name.includes(searchTerm) || desc.includes(searchTerm) || license.includes(searchTerm)) {
                        card.style.display = 'block';
                    } else {
                        card.style.display = 'none';
                    }
                });
            });
        }
        
        // Scroll to category
        window.scrollToCategory = function(categoryId) {
            const element = document.getElementById(`category-${categoryId}`);
            if (element) {
                element.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        };
        
        // Toggle category visibility
        window.toggleCategory = function(categoryId) {
            const category = document.getElementById(`category-${categoryId}`);
            const content = category.querySelectorAll('.subcategory');
            const isHidden = content[0]?.style.display === 'none';
            
            content.forEach(c => {
                c.style.display = isHidden ? 'block' : 'none';
            });
        };
        
        // Setup navigation
        function setupNavigation() {
            const navItems = document.querySelectorAll('.nav-item');
            navItems.forEach(item => {
                item.addEventListener('click', (e) => {
                    e.preventDefault();
                    const categoryName = item.textContent.trim().replace(/[^a-zA-Z\s]/g, '').trim();
                    const categoryId = categoryName.toLowerCase().replace(/[^a-z0-9]+/g, '-');
                    scrollToCategory(categoryId);
                });
            });
        }
        
        // Scroll to top button
        function setupScrollTop() {
            const btn = document.getElementById('scroll-top');
            if (!btn) return;
            
            window.addEventListener('scroll', () => {
                if (window.scrollY > 300) {
                    btn.classList.add('visible');
                } else {
                    btn.classList.remove('visible');
                }
            });
        }
        
        // Update last updated
        function updateLastUpdated() {
            const lastUpdatedElem = document.getElementById('lastUpdated');
            if (lastUpdatedElem) {
                const date = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
                lastUpdatedElem.textContent = date;
            }
        }
        
        // Initialize
        loadAndRender();
    </script>
</body>
</html>
