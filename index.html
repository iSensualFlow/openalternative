 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awesome Open Source Alternatives</title>
    <meta name="description" content="Curated list of open source alternatives to proprietary software">
    
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --border: #30363d;
            --accent: #58a6ff;
            --accent-glow: #1f6feb;
            --success: #3fb950;
            --warning: #d29922;
            --danger: #f85149;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px;
        }

        .loading {
            text-align: center;
            padding: 50px;
        }

        .loader {
            border: 3px solid var(--bg-tertiary);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hero {
            text-align: center;
            padding: 80px 20px;
            background: linear-gradient(135deg, #1a0b2e 0%, #0d1117 100%);
            border-radius: 24px;
            margin-bottom: 40px;
            border: 1px solid var(--border);
        }

        .hero h1 {
            font-size: 3.5rem;
            background: linear-gradient(135deg, #58a6ff, #da6dff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
        }

        .hero-subtitle {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }

        .stat-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            transition: transform 0.2s, border-color 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent);
            display: block;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 8px;
        }

        .note-banner {
            background: rgba(210, 153, 34, 0.1);
            border-left: 4px solid var(--warning);
            padding: 16px 24px;
            border-radius: 8px;
            margin: 24px 0;
        }

        .sponsors {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            margin: 40px 0;
            text-align: center;
        }

        .sponsors-grid {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin: 30px 0;
        }

        .sponsor-item img {
            height: 48px;
            object-fit: contain;
            filter: brightness(0.9);
            transition: filter 0.2s;
        }

        .sponsor-item img:hover {
            filter: brightness(1);
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin: 40px 0;
        }

        .nav-item {
            padding: 8px 12px;
            color: var(--text-primary);
            text-decoration: none;
            border-radius: 8px;
            transition: background 0.2s;
            cursor: pointer;
        }

        .nav-item:hover {
            background: var(--bg-tertiary);
            color: var(--accent);
        }

        .category {
            margin: 50px 0;
        }

        .category-header {
            font-size: 2rem;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .category-header:hover {
            color: var(--accent);
        }

        .subcategory {
            margin: 30px 0;
        }

        .subcategory-header {
            font-size: 1.5rem;
            margin: 20px 0 16px;
            padding-left: 16px;
            border-left: 4px solid var(--accent);
            color: var(--text-primary);
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
        }

        .project-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.2s;
        }

        .project-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .project-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .project-title a {
            color: var(--accent);
            text-decoration: none;
        }

        .project-title a:hover {
            text-decoration: underline;
        }

        .project-description {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin: 12px 0;
            line-height: 1.5;
        }

        .project-meta {
            display: flex;
            gap: 12px;
            margin-top: 12px;
            font-size: 0.8rem;
            flex-wrap: wrap;
        }

        .license-badge {
            background: var(--bg-tertiary);
            padding: 4px 8px;
            border-radius: 6px;
            font-family: monospace;
        }

        .stars-badge {
            color: var(--warning);
        }

        .search-box {
            margin: 20px 0;
        }

        .search-input {
            width: 100%;
            padding: 12px 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            text-decoration: none;
            border-radius: 8px;
            border: 1px solid var(--border);
            transition: all 0.2s;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--accent-glow);
            border-color: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent);
            transform: translateY(-1px);
        }

        .btn:hover {
            background: var(--accent-glow);
            border-color: var(--accent);
            color: white;
        }

        .footer {
            text-align: center;
            padding: 40px;
            margin-top: 60px;
            border-top: 1px solid var(--border);
            color: var(--text-secondary);
        }

        .footer a {
            color: var(--accent);
            text-decoration: none;
        }

        .scroll-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
        }

        .scroll-top.visible {
            opacity: 1;
        }

        .scroll-top:hover {
            background: var(--accent-glow);
            border-color: var(--accent);
        }

        .error-message {
            text-align: center;
            padding: 50px;
            color: var(--danger);
        }

        @media (max-width: 768px) {
            .hero h1 { font-size: 2rem; }
            .projects-grid { grid-template-columns: 1fr; }
            .container { padding: 12px; }
            .hero { padding: 40px 20px; }
            .stats-grid { gap: 12px; }
            .stat-card { padding: 16px; }
            .stat-number { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="loading">
            <div class="loader"></div>
            <p>Loading content from README.md...</p>
        </div>
    </div>

    <script>
        async function loadAndRender() {
            try {
                const response = await fetch('README.md');
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const markdown = await response.text();
                const html = parseMarkdownToHTML(markdown);
                document.querySelector('.container').innerHTML = html;
                
                setupSearch();
                setupScrollTop();
                setupNavigation();
                updateLastUpdated();
                
            } catch (error) {
                console.error('Error loading README:', error);
                document.querySelector('.container').innerHTML = `
                    <div class="hero">
                        <h1>Error Loading Content</h1>
                        <div class="error-message">
                            <p>Unable to load README.md file.</p>
                            <p style="font-size: 0.9rem; margin-top: 20px;">Make sure the file exists in the repository root.</p>
                            <button class="btn btn-primary" onclick="location.reload()" style="margin-top: 20px;">
                                Retry
                            </button>
                        </div>
                    </div>
                `;
            }
        }
        
        function parseMarkdownToHTML(markdown) {
            let html = '';
            
            const titleMatch = markdown.match(/# (.*?)(?:\n|$)/);
            let title = titleMatch ? titleMatch[1] : 'Awesome Open Source Alternatives';
            title = title.replace(/\[([^\]]+)\]\([^)]+\)/g, '$1');
            title = title.replace(/!\[[^\]]*\]\([^)]+\)/g, '');
            title = title.replace(/\*\*|__/g, '');
            title = title.replace(/\s+/g, ' ').trim();
            
            const lines = markdown.split('\n');
            let description = 'Curated list of open source alternatives to proprietary software';
            for (let i = 0; i < Math.min(20, lines.length); i++) {
                if (lines[i].trim() && !lines[i].startsWith('#') && !lines[i].startsWith('[') && !lines[i].startsWith('![')) {
                    description = lines[i].trim().substring(0, 200);
                    break;
                }
            }
            
            html = `
                <div class="hero">
                    <h1>✨ ${title} ✨</h1>
                    <div class="hero-subtitle">
                        ${escapeHtml(description)}
                    </div>
                    <div>
                        <button class="btn btn-primary" onclick="window.open('https://github.com/piotrkulpinski/openalternative', '_blank')">
                            Star on GitHub
                        </button>
                        <button class="btn" onclick="window.open('https://openalternative.co/submit', '_blank')" style="margin-left: 12px;">
                            Submit a Project
                        </button>
                    </div>
                </div>
            `;
            
            const noteMatch = markdown.match(/\*\*Note:\*\* (.*?)(?:\n\n|$)/s);
            if (noteMatch) {
                html += `
                    <div class="note-banner">
                        <strong>Note:</strong> ${escapeHtml(noteMatch[1].replace(/\n/g, ' '))}
                    </div>
                `;
            }
            
            const sponsorSection = extractSponsors(markdown);
            if (sponsorSection) {
                html += sponsorSection;
            }
            
            const statsMatch = markdown.match(/\*\*Total Projects:\*\* (\d+).*?\*\*Categories:\*\* (\d+).*?\*\*Total Stars:\*\* ([\dM]+)/s);
            if (statsMatch) {
                html += `
                    <div class="stats-grid">
                        <div class="stat-card">
                            <span class="stat-number">${statsMatch[1]}</span>
                            <span class="stat-label">Total Projects</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-number">${statsMatch[2]}</span>
                            <span class="stat-label">Categories</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-number">${statsMatch[3]}</span>
                            <span class="stat-label">Total Stars</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-number" id="lastUpdated">--</span>
                            <span class="stat-label">Last Updated</span>
                        </div>
                    </div>
                `;
            }
            
            html += `
                <div class="search-box">
                    <input type="text" class="search-input" id="search-input" placeholder="Search projects by name, description, or license...">
                </div>
            `;
            
            const categories = extractCategoriesFromMarkdown(markdown);
            
            if (categories.length > 0) {
                html += `
                    <div class="nav-grid" id="nav-grid">
                        ${categories.map(cat => `
                            <a class="nav-item" onclick="scrollToCategory('${cat.id}')">${cat.icon || '📁'} ${escapeHtml(cat.name)}</a>
                        `).join('')}
                    </div>
                `;
            }
            
            html += `<div id="content">`;
            
            for (const category of categories) {
                if (category.subcategories.length === 0) continue;
                
                html += `
                    <div class="category" id="category-${category.id}">
                        <div class="category-header" onclick="toggleCategory('${category.id}')">
                            <span>${category.icon || '📁'}</span>
                            <span>${escapeHtml(category.name)}</span>
                            <span style="font-size: 0.8rem; margin-left: auto;">▼</span>
                        </div>
                `;
                
                for (const subcategory of category.subcategories) {
                    if (subcategory.projects.length === 0) continue;
                    
                    html += `
                        <div class="subcategory" data-category="${category.id}">
                            <div class="subcategory-header">${escapeHtml(subcategory.name)}</div>
                            <div class="projects-grid" data-subcategory="${subcategory.name.replace(/[^a-zA-Z0-9]/g, '-')}">
                    `;
                    
                    for (const project of subcategory.projects) {
                        html += `
                            <div class="project-card" data-name="${escapeHtml(project.name.toLowerCase())}" data-description="${escapeHtml(project.description.toLowerCase())}" data-license="${escapeHtml(project.license.toLowerCase())}">
                                <div class="project-title">
                                    <a href="${project.url}" target="_blank" rel="noopener noreferrer">${escapeHtml(project.name)}</a>
                                </div>
                                <div class="project-description">${escapeHtml(project.description)}</div>
                                <div class="project-meta">
                                    <span class="license-badge">${escapeHtml(project.license)}</span>
                                    <span class="stars-badge">${escapeHtml(project.stars)}</span>
                                </div>
                            </div>
                        `;
                    }
                    
                    html += `</div></div>`;
                }
                
                html += `</div>`;
            }
            
            html += `</div>`;
            
            html += `
                <div style="background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 16px; padding: 40px; text-align: center; margin: 40px 0;">
                    <h3 style="margin-bottom: 16px;">Want to contribute?</h3>
                    <p style="color: var(--text-secondary); margin-bottom: 24px;">
                        Submit your project on OpenAlternative and it will automatically appear here once approved.
                    </p>
                    <button class="btn btn-primary" onclick="window.open('https://openalternative.co/submit', '_blank')">
                        Submit a Project
                    </button>
                </div>
            `;
            
            html += `
                <div class="footer">
                    <p>Maintained by <a href="https://openalternative.co">OpenAlternative</a></p>
                    <p style="margin-top: 12px;">
                        <a href="https://github.com/piotrkulpinski/openalternative">GitHub</a> · 
                        <a href="https://twitter.com/openalternative">Twitter</a> · 
                        <a href="https://discord.gg/openalternative">Discord</a>
                    </p>
                    <p style="margin-top: 12px; font-size: 0.85rem;" id="updateTime"></p>
                </div>
            `;
            
            html += `<div class="scroll-top" id="scroll-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">↑</div>`;
            
            return html;
        }
        
        function extractSponsors(markdown) {
            const sponsorMatch = markdown.match(/## Sponsors\n(.*?)(?=\n## |\n---|\n$)/s);
            if (!sponsorMatch) return null;
            
            const imgMatches = [...sponsorMatch[1].matchAll(/<img[^>]*src="([^"]*)"[^>]*>/g)];
            if (imgMatches.length === 0) return null;
            
            return `
                <div class="sponsors">
                    <h2>Sponsors</h2>
                    <div class="sponsors-grid">
                        ${imgMatches.map(img => `
                            <div class="sponsor-item">
                                <img src="${img[1]}" alt="Sponsor">
                            </div>
                        `).join('')}
                    </div>
                    <p><a href="https://openalternative.co/advertise" style="color: var(--accent);">Become a sponsor →</a></p>
                </div>
            `;
        }
        
        function extractCategoriesFromMarkdown(markdown) {
            const categories = [];
            const lines = markdown.split('\n');
            
            let currentCategory = null;
            let currentSubcategory = null;
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                
                if (line.startsWith('## ') && !line.startsWith('###')) {
                    if (currentCategory && currentCategory.subcategories.length > 0) {
                        categories.push(currentCategory);
                    }
                    
                    const categoryName = line.replace('## ', '');
                    if (categoryName === 'Sponsors' || categoryName === 'Contents' || 
                        categoryName === 'Contributing' || categoryName === 'Footnotes') {
                        currentCategory = null;
                        continue;
                    }
                    
                    currentCategory = {
                        name: categoryName,
                        id: categoryName.toLowerCase().replace(/[^a-z0-9]+/g, '-'),
                        icon: getCategoryIcon(categoryName),
                        subcategories: []
                    };
                }
                else if (line.startsWith('### ') && currentCategory) {
                    const subcategoryName = line.replace('### ', '');
                    currentSubcategory = {
                        name: subcategoryName,
                        projects: []
                    };
                    currentCategory.subcategories.push(currentSubcategory);
                }
                else if (currentSubcategory && (line.startsWith('- [') || (line.startsWith('|') && line.includes('](http')))) {
                    let projectMatch = null;
                    
                    if (line.startsWith('- [')) {
                        projectMatch = line.match(/-\s*\[(.*?)\]\((.*?)\)\s*-\s*(.*?)(?:\s+`(.*?)`\s+[⭐*]*\s*([\d.KM]+))?/);
                    }
                    else if (line.startsWith('|')) {
                        const parts = line.split('|').map(p => p.trim());
                        if (parts.length >= 4) {
                            const linkMatch = parts[1].match(/\[(.*?)\]\((.*?)\)/);
                            if (linkMatch) {
                                projectMatch = [null, linkMatch[1], linkMatch[2], parts[2], parts[3], parts[4].replace('⭐', '').trim()];
                            }
                        }
                    }
                    
                    if (projectMatch) {
                        currentSubcategory.projects.push({
                            name: projectMatch[1],
                            url: projectMatch[2],
                            description: (projectMatch[3] || '').substring(0, 200),
                            license: (projectMatch[4] || 'MIT').replace(/[`|]/g, '').trim(),
                            stars: `⭐ ${projectMatch[5] || '0'}`
                        });
                    }
                }
            }
            
            if (currentCategory && currentCategory.subcategories.length > 0) {
                categories.push(currentCategory);
            }
            
            return categories;
        }
        
        function getCategoryIcon(categoryName) {
            const icons = {
                'AI & Machine Learning': '🤖',
                'Business Software': '💼',
                'Community & Social': '👥',
                'Content & Publishing': '📝',
                'Data & Analytics': '📊',
                'Developer Tools': '🛠️',
                'Infrastructure & Operations': '🏗️',
                'Miscellaneous': '🎲',
                'Productivity & Utilities': '⚡',
                'Security & Privacy': '🔒'
            };
            return icons[categoryName] || '📁';
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function setupSearch() {
            const searchInput = document.getElementById('search-input');
            if (!searchInput) return;
            
            searchInput.addEventListener('input', (e) => {
                const searchTerm = e.target.value.toLowerCase().trim();
                const projectCards = document.querySelectorAll('.project-card');
                
                let visibleCount = 0;
                projectCards.forEach(card => {
                    const name = card.getAttribute('data-name') || '';
                    const desc = card.getAttribute('data-description') || '';
                    const license = card.getAttribute('data-license') || '';
                    
                    if (searchTerm === '' || name.includes(searchTerm) || desc.includes(searchTerm) || license.includes(searchTerm)) {
                        card.style.display = 'block';
                        visibleCount++;
                    } else {
                        card.style.display = 'none';
                    }
                });
                
                const subcategories = document.querySelectorAll('.subcategory');
                subcategories.forEach(sub => {
                    const visibleProjects = sub.querySelectorAll('.project-card[style="display: block"]').length;
                    sub.style.display = visibleProjects > 0 || searchTerm === '' ? 'block' : 'none';
                });
            });
        }
        
        window.scrollToCategory = function(categoryId) {
            const element = document.getElementById(`category-${categoryId}`);
            if (element) {
                element.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        };
        
        window.toggleCategory = function(categoryId) {
            const category = document.getElementById(`category-${categoryId}`);
            const subcategories = category.querySelectorAll('.subcategory');
            const header = category.querySelector('.category-header');
            const isHidden = subcategories[0]?.style.display === 'none';
            
            subcategories.forEach(sub => {
                sub.style.display = isHidden ? 'block' : 'none';
            });
            
            if (header) {
                const arrow = header.querySelector('span:last-child');
                if (arrow) {
                    arrow.style.transform = isHidden ? 'rotate(0deg)' : 'rotate(-90deg)';
                    arrow.style.transition = 'transform 0.3s';
                }
            }
        };
        
        function setupNavigation() {
            const arrows = document.querySelectorAll('.category-header span:last-child');
            arrows.forEach(arrow => {
                arrow.style.display = 'inline-block';
            });
        }
        
        function setupScrollTop() {
            const btn = document.getElementById('scroll-top');
            if (!btn) return;
            
            window.addEventListener('scroll', () => {
                if (window.scrollY > 300) {
                    btn.classList.add('visible');
                } else {
                    btn.classList.remove('visible');
                }
            });
        }
        
        function updateLastUpdated() {
            const lastUpdatedElem = document.getElementById('lastUpdated');
            const updateTimeElem = document.getElementById('updateTime');
            const date = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
            
            if (lastUpdatedElem) {
                lastUpdatedElem.textContent = date;
            }
            if (updateTimeElem) {
                updateTimeElem.textContent = `Last updated: ${date}`;
            }
        }
        
        loadAndRender();
    </script>
</body>
</html>
